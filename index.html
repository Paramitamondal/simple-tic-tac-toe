
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic‑Tac‑Toe</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="msg-container hide" role="dialog" aria-live="polite">
    <p id="msg">Winner</p>
    <button id="new-btn" class="btn btn-primary">New Game</button>
  </div>

  <main class="app">
    <header>
      <h1>Tic‑Tac‑Toe</h1>
      <p class="sub">Play against a friend — simple, clean and responsive.</p>
    </header>

    <section class="board-wrap">
      <div class="game" role="grid" aria-label="Tic Tac Toe board">
        <button class="box" aria-label="cell 1"></button>
        <button class="box" aria-label="cell 2"></button>
        <button class="box" aria-label="cell 3"></button>
        <button class="box" aria-label="cell 4"></button>
        <button class="box" aria-label="cell 5"></button>
        <button class="box" aria-label="cell 6"></button>
        <button class="box" aria-label="cell 7"></button>
        <button class="box" aria-label="cell 8"></button>
        <button class="box" aria-label="cell 9"></button>
      </div>
    </section>

    <div class="controls">
      <button id="reset-btn" class="btn btn-ghost">Reset game</button>
    </div>
  </main>
</body>
</html>
