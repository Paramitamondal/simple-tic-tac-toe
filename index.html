
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic‑Tac‑Toe</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="msg-container hide" role="dialog" aria-live="polite">
    <p id="msg">Winner</p>
    <button id="new-btn" class="btn btn-primary">New Game</button>
  </div>

  <main class="app">
    <header>
      <h1>Tic‑Tac‑Toe</h1>
      <p class="sub">Play alone or with a friend — choose mode below.</p>
    </header>

    <div class="mode-panel">
      <div class="mode-row">
        <label><input type="radio" name="mode" value="multi" checked> Two Players</label>
        <label><input type="radio" name="mode" value="single"> Single Player (vs Bot)</label>
      </div>

      <div class="mode-row single-only hide" id="single-options">
        <span class="muted">Play as:</span>
        <label><input type="radio" name="play-as" value="X" checked> X</label>
        <label><input type="radio" name="play-as" value="O"> O</label>
      </div>

      <div class="mode-row">
        <button id="start-btn" class="btn btn-primary">Start / Restart</button>
      </div>
    </div>

    <section class="board-wrap">
      <div class="game" role="grid" aria-label="Tic Tac Toe board">
        <button class="box" aria-label="cell 1" data-index="0"></button>
        <button class="box" aria-label="cell 2" data-index="1"></button>
        <button class="box" aria-label="cell 3" data-index="2"></button>
        <button class="box" aria-label="cell 4" data-index="3"></button>
        <button class="box" aria-label="cell 5" data-index="4"></button>
        <button class="box" aria-label="cell 6" data-index="5"></button>
        <button class="box" aria-label="cell 7" data-index="6"></button>
        <button class="box" aria-label="cell 8" data-index="7"></button>
        <button class="box" aria-label="cell 9" data-index="8"></button>
      </div>
    </section>

    <div class="controls">
      <button id="reset-btn" class="btn btn-ghost">Reset game</button>
    </div>
  </main>
</body>
</html>
